<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      color: #1a1a1a;
      line-height: 1.7;
      background: #fafafa;
    }
    h1 { color: #2E7D32; border-bottom: 3px solid #2E7D32; padding-bottom: 0.4rem; }
    h2 { color: #500257; margin-top: 2.5rem; }
    h3 { color: #333; }
    a { color: #2E7D32; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.6rem 1rem;
      text-align: left;
    }
    th { background: #500257; color: white; }
    tr:nth-child(even) { background: #f4f4f4; }
    .mermaid { background: white; border-radius: 8px; padding: 1rem; margin: 1.5rem 0; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    nav { margin-bottom: 2rem; }
    nav a { margin-right: 1.5rem; font-weight: bold; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ "/" | relative_url }}">Etusivu</a>
    <a href="{{ "/pelihanke" | relative_url }}">Hankedokumentti</a>
  </nav>
  {{ content }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'default' });
  </script>
</body>
</html>
